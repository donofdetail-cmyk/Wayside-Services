<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO -->
    <title>Wayside Services | Home Maintenance in Reno, NV</title>
    <meta name="description" content="Reno's trusted home maintenance service. Monthly visits covering AC filters, plumbing checks, light bulbs, and more. Licensed, fully insured, and locally vetted." />
    <meta name="keywords" content="home maintenance Reno, home repair Reno NV, handyman Reno Nevada, monthly home care, home maintenance subscription, Reno home services" />
    <meta name="geo.region" content="US-NV" />
    <meta name="geo.placename" content="Reno" />
    <link rel="canonical" href="https://wayside.com" />

    <!-- Open Graph -->
    <meta property="og:title" content="Wayside Services | Home Maintenance Serving Greater Reno" />
    <meta property="og:description" content="Monthly home maintenance for Reno homeowners. One visit, one flat price. Fully insured and locally vetted experts." />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="en_US" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "HomeAndConstructionBusiness",
          "name": "Wayside Services",
          "url": "https://wayside.com",
          "telephone": "+15551234567",
          "email": "hello@wayside.com",
          "areaServed": "Reno, NV",
          "description": "Monthly home maintenance for Reno homeowners. One monthly visit, one flat rate.",
          "priceRange": "$99 - $129"
        },
        {
          "@type": "FAQPage",
          "mainEntity": [
            {
              "@type": "Question",
              "name": "What happens during a visit?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Your technician works through your home's monthly checklist. We handle routine visual checks, filter swaps, and whatever seasonal or annual maintenance tasks are scheduled for that month."
              }
            },
            {
              "@type": "Question",
              "name": "Do you perform all of the listed services every single month?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "No. While some tasks happen monthly, others are scheduled annually or seasonally. Your flat monthly rate covers a rotating year-round checklist."
              }
            },
            {
              "@type": "Question",
              "name": "Are you licensed and insured?",
              "acceptedAnswer": {
                "@type": "Answer",
                "text": "Absolutely. Every technician is fully insured and we maintain all necessary state and local licensing."
              }
            }
          ]
        }
      ]
    }
    </script>

    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
